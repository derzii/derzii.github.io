<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESSAY TITLE — Manny's Marginalia</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="progress-bar" id="progress"></div>
<div class="page">

  <a class="back-link" href="index.html">← All essays</a>

  <div class="essay-header">
    <h1>ESSAY TITLE</h1>
    <p class="essay-subtitle">SUBTITLE</p>
    <div class="essay-header-meta">
      <span class="essay-tag">Philosophy</span>
      <span class="essay-date">DD Mon YYYY</span>
    </div>
  </div>

  <div class="essay-body">

    <p>First paragraph.</p>

    <h2>01 &nbsp; SECTION TITLE</h2>

    <p>Body text.</p>

    <blockquote>
      <p>A line you want to pull out.</p>
    </blockquote>

    <p>More body text.</p>

    <hr>

    <p>After a break.</p>

  </div>

  <div class="essay-footer">
    <a class="back-to-index" href="index.html">← All essays</a>
  </div>

</div>
<script>
  const bar = document.getElementById("progress");
  window.addEventListener("scroll", () => {
    const doc = document.documentElement;
    const scrolled = doc.scrollTop || document.body.scrollTop;
    const total = doc.scrollHeight - doc.clientHeight;
    bar.style.height = (scrolled / total * 100) + "%";
  });
</script>
</body>
</html>
